spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    export:
      enabled: false

logging:
  level:
    org.ohmyopensource: DEBUG
    org.springframework.security: DEBUG
    org.testcontainers: INFO
    org.flywaydb: DEBUG