sonar.projectKey=ohmyopensource_ohmyuniversity-api-core
sonar.organization=ohmyopensource
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

# Sources
sonar.sources=src/main/java
sonar.tests=src/test/java

# Exclusions
sonar.exclusions=\
  **/dto/**,\
  **/domain/entity/**,\
  **/domain/repository/**,\
  **/OhmyuniversityCoreApplication.java,\
  **/config/DotenvLoader.java,\
  **/config/OmuPrincipal.java

sonar.coverage.exclusions=\
  **/dto/**,\
  **/domain/entity/**,\
  **/domain/repository/**,\
  **/OhmyuniversityCoreApplication.java,\
  **/config/DotenvLoader.java,\
  **/config/OmuPrincipal.java

# JaCoCo
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Java version
sonar.java.source=21